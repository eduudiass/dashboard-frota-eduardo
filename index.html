<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Frota</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2>🚗 Dashboard</h2>

    <a href="#" class="nav-item active" data-page="dashboard">Dashboard</a>
    <a href="#" class="nav-item" data-page="veiculos">Veículos</a>
    <a href="#" class="nav-item" data-page="manutencoes">Manutenção</a>
    <a href="#" class="nav-item" data-page="gastos">Gastos</a>

    <br><br>

    <!-- INPUT EXCEL FUNCIONANDO -->
    <input type="file" id="fileInput" accept=".xlsx">
</div>

<!-- CONTEÚDO -->
<div class="main-content">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
        <h1>Dashboard</h1>

        <p>Total veículos: <span id="totalVeiculos">0</span></p>
        <p>Ativos: <span id="veiculosAtivos">0</span></p>

        <p>Receita: <span id="kpiReceita">0</span></p>
        <p>Lucro: <span id="kpiLucro">0</span></p>

        <canvas id="chartReceitas"></canvas>
    </div>

    <!-- VEÍCULOS -->
    <div id="page-veiculos" class="page">
        <h2>Veículos</h2>
        <div id="listaVeiculos"></div>
    </div>

    <!-- MANUTENÇÃO -->
    <div id="page-manutencoes" class="page">
        <h2>Manutenção</h2>
        <p>Dados carregados da planilha</p>
    </div>

    <!-- GASTOS -->
    <div id="page-gastos" class="page">
        <h2>Gastos</h2>
        <p>Dados carregados da planilha</p>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
