<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Frota</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --primary: #10b981;
            --primary-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 250px; background-color: var(--bg-card); border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; transition: 0.3s; z-index: 100; }
        .logo { padding: 0 20px 20px; font-size: 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .highlight { color: var(--primary); }
        .nav-links { list-style: none; }
        .nav-links li a { display: block; padding: 15px 20px; color: var(--text-muted); text-decoration: none; font-size: 16px; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-links li a:hover, .nav-links li a.active { background-color: rgba(16, 185, 129, 0.1); color: var(--primary); border-left-color: var(--primary); }

        /* Mobile Header */
        .mobile-header { display: none; background-color: var(--bg-card); padding: 15px 20px; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: fixed; width: 100%; top: 0; z-index: 99; }
        #menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; height: 100vh; }

        /* Upload Section */
        .upload-section { background-color: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; border: 1px dashed var(--border); flex-wrap: wrap; }
        .upload-btn { background-color: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .upload-btn:hover { background-color: var(--primary-hover); }
        #file-name { color: var(--text-muted); font-size: 14px; }

        /* Dashboard Cards */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { color: var(--text-muted); font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .card .value { font-size: 28px; font-weight: bold; color: var(--text-main); }
        .card .value.positive { color: var(--primary); }
        .card .value.negative { color: var(--danger); }

        /* Charts */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .chart-container { background-color: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }

        /* Pages & Tables */
        .page { display: none; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .table-responsive { width: 100%; overflow-x: auto; background-color: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; white-space: nowrap; }
        th { color: var(--text-muted); font-weight: 600; background-color: rgba(0,0,0,0.2); }
        tr:hover { background-color: rgba(255,255,255,0.02); }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; left: -250px; top: 60px; height: calc(100vh - 60px); }
            .sidebar.open { left: 0; }
            .mobile-header { display: flex; }
            .main-content { padding: 80px 15px 20px; height: auto; }
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <h2>🚗 Frota<span class="highlight">App</span></h2>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active" data-target="dashboard">📊 Resumo</a></li>
            <li><a href="#" data-target="veiculos">🚙 Veículos</a></li>
            <li><a href="#" data-target="receitas">💰 Receitas</a></li>
            <li><a href="#" data-target="gastos">💸 Gastos</a></li>
            <li><a href="#" data-target="manutencao">🔧 Manutenção</a></li>
            <li><a href="#" data-target="compras">🛒 Compras</a></li>
            <li><a href="#" data-target="vendas">🤝 Vendas</a></li>
        </ul>
    </nav>

    <header class="mobile-header">
        <h2>🚗 Frota<span class="highlight">App</span></h2>
        <button id="menu-btn">☰</button>
    </header>

    <main class="main-content">
        
        <div class="upload-section">
            <label for="excel-upload" class="upload-btn">
                📂 Carregar Planilha Excel
            </label>
            <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display: none;">
            <span id="file-name">Nenhuma planilha carregada...</span>
        </div>

        <div id="dashboard" class="page active">
            <div class="cards-grid" id="resumo-cards">
                <div class="card empty-state">Carregue sua planilha para ver os dados.</div>
            </div>
            <div class="charts-grid">
                <div class="chart-container"><canvas id="chartReceitasDespesas"></canvas></div>
                <div class="chart-container"><canvas id="chartStatus"></canvas></div>
            </div>
        </div>

        <div id="veiculos" class="page"><div class="table-responsive" id="tabela-veiculos"></div></div>
        <div id="receitas" class="page"><div class="table-responsive" id="tabela-receitas"></div></div>
        <div id="gastos" class="page"><div class="table-responsive" id="tabela-gastos"></div></div>
        <div id="manutencao" class="page"><div class="table-responsive" id="tabela-manutencao"></div></div>
        <div id="compras" class="page"><div class="table-responsive" id="tabela-compras"></div></div>
        <div id="vendas" class="page"><div class="table-responsive" id="tabela-vendas"></div></div>

    </main>

    <script>
        let frotaData = { veiculos: [], receitas: [], gastos: [], manutencao: [], compras: [], vendas: [] };
        let graficos = {};

        // Navegação do Menu
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                
                link.classList.add('active');
                const target = link.getAttribute('data-target');
                document.getElementById(target).classList.add('active');
                document.getElementById('sidebar').classList.remove('open');
            });
        });

        // Menu Mobile Toggle
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Leitura do Arquivo Excel
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('file-name').textContent = "Processando: " + file.name;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                processarPlanilhas(workbook);
                document.getElementById('file-name').textContent = "✅ Dados atualizados com sucesso!";
            };
            reader.readAsArrayBuffer(file);
        });

        // Processamento das Abas da Planilha
        function processarPlanilhas(workbook) {
            frotaData = { veiculos: [], receitas: [], gastos: [], manutencao: [], compras: [], vendas: [] };

            workbook.SheetNames.forEach(sheetName => {
                const nomeLower = sheetName.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" });
                
                const cleanData = rawData.map(row => {
                    let newRow = {};
                    for (let key in row) {
                        let cleanKey = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(/\s+/g, '_');
                        newRow[cleanKey] = row[key];
                    }
                    return newRow;
                });

                if (nomeLower.includes('veiculo')) frotaData.veiculos = cleanData;
                else if (nomeLower.includes('receita')) frotaData.receitas = cleanData;
                else if (nomeLower.includes('gasto')) frotaData.gastos = cleanData;
                else if (nomeLower.includes('manutencao')) frotaData.manutencao = cleanData;
                else if (nomeLower.includes('compra')) frotaData.compras = cleanData;
                else if (nomeLower.includes('venda')) frotaData.vendas = cleanData;
            });

            renderizarDashboard();
            renderizarTabelas();
        }

        // Utilitários
        function toNum(val) {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            const num = parseFloat(String(val).replace(/[^\d.,-]/g, '').replace(',', '.'));
            return isNaN(num) ? 0 : num;
        }
        function toBRL(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(toNum(val));
        }

        // Renderizar Resumo (Dashboard)
        function renderizarDashboard() {
            const totalReceitas = frotaData.receitas.reduce((acc, row) => acc + toNum(row.valor || row.total || row.receita || 0), 0);
            const totalGastos = frotaData.gastos.reduce((acc, row) => acc + toNum(row.valor || row.total || row.gasto || 0), 0);
            const totalManutencao = frotaData.manutencao.reduce((acc, row) => acc + toNum(row.valor || row.total || row.custo || 0), 0);
            const lucroLiquido = totalReceitas - totalGastos - totalManutencao;
            const qdtVeiculos = frotaData.veiculos.length;

            document.getElementById('resumo-cards').innerHTML = `
                <div class="card">
                    <h3>🚗 Total de Veículos</h3>
                    <div class="value">${qdtVeiculos}</div>
                </div>
                <div class="card">
                    <h3>💰 Receitas Totais</h3>
                    <div class="value positive">${toBRL(totalReceitas)}</div>
                </div>
                <div class="card">
                    <h3>💸 Gastos + Manutenção</h3>
                    <div class="value negative">${toBRL(totalGastos + totalManutencao)}</div>
                </div>
                <div class="card">
                    <h3>📊 Resultado Liquido</h3>
                    <div class="value ${lucroLiquido >= 0 ? 'positive' : 'negative'}">${toBRL(lucroLiquido)}</div>
                </div>
            `;

            atualizarGraficos(totalReceitas, totalGastos, totalManutencao);
        }

        // Atualizar Gráficos
        function atualizarGraficos(receita, gasto, manutencao) {
            if(graficos.financas) graficos.financas.destroy();
            if(graficos.status) graficos.status.destroy();

            const ctxFin = document.getElementById('chartReceitasDespesas').getContext('2d');
            graficos.financas = new Chart(ctxFin, {
                type: 'bar',
                data: {
                    labels: ['Receitas', 'Gastos', 'Manutenção'],
                    datasets: [{
                        label: 'Valores em R$',
                        data: [receita, gasto, manutencao],
                        backgroundColor: ['#10b981', '#ef4444', '#f59e0b'],
                        borderRadius: 6
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            const statusCount = {};
            frotaData.veiculos.forEach(v => {
                const s = v.status || 'Desconhecido';
                statusCount[s] = (statusCount[s] || 0) + 1;
            });

            const ctxStat = document.getElementById('chartStatus').getContext('2d');
            graficos.status = new Chart(ctxStat, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(statusCount),
                    datasets: [{
                        data: Object.values(statusCount),
                        backgroundColor: ['#10b981', '#ef4444', '#f59e0b', '#3b82f6'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc' } } } }
            });
        }

        // Criador Automático de Tabelas
        function renderizarTabelas() {
            gerarTabelaHTML(frotaData.veiculos, 'tabela-veiculos');
            gerarTabelaHTML(frotaData.receitas, 'tabela-receitas');
            gerarTabelaHTML(frotaData.gastos, 'tabela-gastos');
            gerarTabelaHTML(frotaData.manutencao, 'tabela-manutencao');
            gerarTabelaHTML(frotaData.compras, 'tabela-compras');
            gerarTabelaHTML(frotaData.vendas, 'tabela-vendas');
        }

        function gerarTabelaHTML(dados, elementoId) {
            const div = document.getElementById(elementoId);
            if (!dados || dados.length === 0) {
                div.innerHTML = "<p style='padding: 20px; color: #94a3b8;'>Nenhum dado encontrado para esta aba na planilha.</p>";
                return;
            }

            const cabecalhos = Object.keys(dados[0]).filter(k => k !== '__rowNum__');

            let html = '<table><thead><tr>';
            cabecalhos.forEach(cab => {
                let nomeBonito = cab.charAt(0).toUpperCase() + cab.slice(1).replace(/_/g, ' ');
                html += `<th>${nomeBonito}</th>`;
            });
            html += '</tr></thead><tbody>';

            dados.forEach(linha => {
                html += '<tr>';
                cabecalhos.forEach(cab => {
                    let valor = linha[cab];
                    if (typeof valor === 'number' && (cab.includes('valor') || cab.includes('total') || cab.includes('preco') || cab.includes('custo') || cab.includes('aluguel'))) {
                        valor = toBRL(valor);
                    }
                    html += `<td>${valor !== undefined && valor !== "" ? valor : '-'}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';

            div.innerHTML = html;
        }
    </script>
</body>
</html>
